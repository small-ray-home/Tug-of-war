<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>青埔國中 114 學年度七年級第一次段考 - 即時儀表板</title>
    
    <link rel="manifest" href="manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@100..900&family=Noto+Sans+TC:wght@100..900&display=swap');
        
        body {
            font-family: 'Inter', 'Noto Sans TC', sans-serif;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 1rem;
            background-color: #a4c9e4;
            background-image: radial-gradient(#d3e6f5 1px, transparent 1px), radial-gradient(#d3e6f5 1px, transparent 1px);
            background-size: 20px 20px;
            background-position: 0 0, 10px 10px;
            zoom: 95%;
            overflow: hidden; /* 預設禁止滾動 */
        }

        /* --- 1920*1080 固定解析度遮罩邏輯 --- */
        #fullscreen-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background-color: #020617; /* 最深色背景 */
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 99999;
            cursor: pointer;
            overflow: hidden;
        }

        /* 固定 16:9 的內容區域 */
        #overlay-content-area {
            width: 1920px;
            height: 1080px;
            background-color: #0f172a; /* 內容區域的深色背景 */
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            border: 2px solid #1e293b; /* 可選：加個邊框區分 1920 區域 */
            box-shadow: 0 0 100px rgba(0,0,0,0.8);
            
            /* RWD 防呆：當螢幕小於 1920*1080 時自動縮放 */
            max-width: 100vw;
            max-height: 100vh;
            aspect-ratio: 1920 / 1080;
        }

        .dashboard-container { max-width: 1100px; width: 100%; }
        .card { background-color: white; border-radius: 1.5rem; padding: 1.5rem; box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1); }
        .exam-table th, .exam-table td { padding: 16px 20px; font-size: 1.3rem; text-align: center; border-bottom: 1px solid #f0f0f0; }
        .subject-name { font-weight: 800; }
        input::-webkit-outer-spin-button, input::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
    </style>
</head>
<body id="body-tag">

    <div id="fullscreen-overlay" onclick="requestFullScreen()">
        <div id="overlay-content-area" class="p-10">
            <h2 id="overlay-text" class="text-6xl font-black mb-20 leading-tight text-center">
                請點擊畫面進入全螢幕模式
            </h2>
            <button id="overlay-confirm-btn" onclick="hideOverlay(event)" 
                    class="hidden px-24 py-8 bg-blue-600 text-white rounded-full font-black text-4xl hover:bg-blue-700 transition-all shadow-2xl active:scale-95">
                確 定
            </button>
        </div>
    </div>

    <div class="dashboard-container">
        <header class="text-center mb-6">
            <h1 class="text-2xl sm:text-3xl font-extrabold text-blue-900">
                青埔國中 114 學年度七年級第一次段考
            </h1>
        </header>

        <div class="grid grid-cols-1 lg:grid-cols-2 gap-6 mb-6">
            <div class="card flex flex-col items-center justify-center text-center">
                <h2 class="text-xl font-bold text-gray-800 mb-2">⏱️ 當前日期與時間</h2>
                <div id="current-date" class="text-2xl font-semibold text-gray-700 mb-2"></div>
                <div id="current-time" class="text-5xl sm:text-6xl font-extrabold text-blue-600"></div>
            </div>

            <div class="card flex flex-col justify-center">
                <h2 class="text-xl font-bold text-gray-800 mb-4 text-center">👥 考場人數統計</h2>
                <div class="grid grid-cols-3 gap-4 text-center">
                    <div>
                        <p class="text-gray-500 font-bold mb-1">應到</p>
                        <input type="number" id="total-students" value="30" min="0" oninput="updateAttendance()" 
                               class="w-full text-3xl font-black text-center border-b-2 border-gray-200 focus:border-blue-500 outline-none">
                    </div>
                    <div>
                        <p class="text-gray-500 font-bold mb-1">實到</p>
                        <input type="number" id="present-students" value="30" min="0" oninput="updateAttendance()" 
                               class="w-full text-3xl font-black text-center text-green-600 border-b-2 border-gray-200 focus:border-green-500 outline-none">
                    </div>
                    <div>
                        <p class="text-gray-500 font-bold mb-1">缺席</p>
                        <div id="absent-students" class="text-3xl font-black text-red-600">0</div>
                    </div>
                </div>
            </div>
        </div>

        <div class="card mb-6 flex flex-col items-center justify-center p-6 text-center">
            <p class="text-xl font-semibold text-gray-500 mb-3">📝 現在科目與活動狀態</p>
            <div id="current-subject-output" class="text-2xl sm:text-4xl font-bold min-h-[3rem]">載入中...</div>
        </div>
        
        <div class="card">
            <div class="flex justify-center space-x-4 mb-6">
                <button id="btn-day1" onclick="switchDay('Day1')" class="px-8 py-3 rounded-full font-bold transition-all bg-blue-600 text-white shadow-lg">04/01（三）</button>
                <button id="btn-day2" onclick="switchDay('Day2')" class="px-8 py-3 rounded-full font-bold transition-all bg-gray-200 text-gray-700">04/02（四）</button>
            </div>
            <div class="overflow-x-auto">
                <table class="w-full exam-table">
                    <thead>
                        <tr class="bg-gray-50">
                            <th class="w-1/4">節次</th>
                            <th class="w-1/3">時間</th>
                            <th id="exam-day-header">科目</th>
                        </tr>
                    </thead>
                    <tbody id="schedule-table-body" class="bg-white"></tbody>
                </table>
            </div>
        </div>
    </div>

    <script>
        // --- 全螢幕遮罩邏輯修復 ---
        function requestFullScreen() {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen().catch(err => {
                    console.log("全螢幕請求失敗");
                });
            }
        }

        document.addEventListener('fullscreenchange', () => {
            const overlay = document.getElementById('fullscreen-overlay');
            const text = document.getElementById('overlay-text');
            const btn = document.getElementById('overlay-confirm-btn');

            if (document.fullscreenElement) {
                // 進入全螢幕後：更換文字，顯現確定按鈕
                text.innerHTML = "已進入全螢幕模式<br><span class='text-4xl text-gray-400 mt-10 block'>按 ESC 鍵可退出並重新鎖定</span>";
                btn.classList.remove('hidden');
                overlay.style.cursor = "default";
            } else {
                // 退出全螢幕：強制重整
                window.location.reload();
            }
        });

        function hideOverlay(event) {
            // 重要：阻止點擊事件冒泡到父層 overlay 再次觸發 requestFullScreen
            event.stopPropagation(); 
            const overlay = document.getElementById('fullscreen-overlay');
            overlay.style.display = 'none'; // 直接隱藏
            document.getElementById('body-tag').style.overflow = 'auto'; // 允許滾動內容
        }

        // --- 其餘考程與計時邏輯保持不變 ---
        function updateAttendance() {
            const totalInput = document.getElementById('total-students');
            const presentInput = document.getElementById('present-students');
            let total = parseInt(totalInput.value) || 0;
            let present = parseInt(presentInput.value) || 0;
            if (total < 0) total = 0; totalInput.value = total;
            if (present < 0) present = 0;
            if (present > total) present = total; presentInput.value = present;
            document.getElementById('absent-students').textContent = total - present;
        }

        const DAY1_DATE_STR = "2026/04/01";
        const DAY2_DATE_STR = "2026/04/02";
        const SCHEDULE_DATA = [
            { session: '第一節', time: '08:30–09:15', day1: { name: '自習', isExam: false }, day2: { name: '自習', isExam: false } },
            { session: '第二節', time: '09:25–10:10', day1: { name: '國文', isExam: true }, day2: { name: '英文(含聽力)', isExam: true } },
            { session: '第三節', time: '10:20–11:05', day1: { name: '自習', isExam: false }, day2: { name: '自習', isExam: false } },
            { session: '第四節', time: '11:15–12:00', day1: { name: '生物', isExam: true }, day2: { name: '數學', isExam: true } },
            { session: '午休',   time: '12:00–13:15', day1: { name: '午休及午餐', isExam: false }, day2: { name: '午休及午餐', isExam: false } },
            { session: '第五節', time: '13:15–13:55', day1: { name: '自習', isExam: false }, day2: { name: '班際體育競賽', isExam: false } },
            { session: '第六節', time: '14:05–14:55', day1: { name: '寫作測驗', isExam: true }, day2: { name: '班際體育競賽', isExam: false } },
            { session: '第七節', time: '15:05–15:50', day1: { name: '社會', isExam: true }, day2: { name: '班際體育競賽', isExam: false } },
        ];

        let currentView = 'Day1';
        function switchDay(day) {
            currentView = day;
            const isDay1 = (day === 'Day1');
            document.getElementById('btn-day1').className = isDay1 ? 'px-8 py-3 rounded-full font-bold bg-blue-600 text-white shadow-lg' : 'px-8 py-3 rounded-full font-bold bg-gray-200 text-gray-700';
            document.getElementById('btn-day2').className = !isDay1 ? 'px-8 py-3 rounded-full font-bold bg-blue-600 text-white shadow-lg' : 'px-8 py-3 rounded-full font-bold bg-gray-200 text-gray-700';
            document.getElementById('exam-day-header').textContent = isDay1 ? '04/01（三）科目' : '04/02（四）科目';
            renderTable();
        }

        function renderTable() {
            const body = document.getElementById('schedule-table-body');
            body.innerHTML = '';
            const now = new Date();
            const todayStr = now.toLocaleDateString('zh-TW', {year:'numeric', month:'2-digit', day:'2-digit'}).replace(/\//g, '/');
            const nowMin = now.getHours() * 60 + now.getMinutes();

            SCHEDULE_DATA.forEach(item => {
                const row = document.createElement('tr');
                const [startStr, endStr] = item.time.split('–');
                const startMin = parseInt(startStr.split(':')[0]) * 60 + parseInt(startStr.split(':')[1]);
                const endMin = parseInt(endStr.split(':')[0]) * 60 + parseInt(endStr.split(':')[1]);
                const isCorrectDay = (todayStr === DAY1_DATE_STR && currentView === 'Day1') || (todayStr === DAY2_DATE_STR && currentView === 'Day2');
                
                if (isCorrectDay && nowMin >= startMin && nowMin < endMin) {
                    row.className = 'bg-yellow-100 ring-2 ring-yellow-400 ring-inset font-bold';
                }
                
                const dayData = (currentView === 'Day1') ? item.day1 : item.day2;
                const subjectColor = dayData.isExam ? 'text-red-600' : 'text-green-600';
                row.innerHTML = `<td>${item.session}</td><td>${item.time}</td><td><span class="subject-name ${subjectColor}">${dayData.name}</span></td>`;
                body.appendChild(row);
            });
        }

        function updateClock() {
            const now = new Date();
            const todayStr = now.toLocaleDateString('zh-TW', {year:'numeric', month:'2-digit', day:'2-digit'}).replace(/\//g, '/');
            document.getElementById('current-date').textContent = now.toLocaleDateString('zh-TW', { year: 'numeric', month: '2-digit', day: '2-digit', weekday: 'long' });
            document.getElementById('current-time').textContent = now.toLocaleTimeString('zh-TW', { hour12: false });
            
            let statusText = (todayStr !== DAY1_DATE_STR && todayStr !== DAY2_DATE_STR) ? "📅 目前非段考日期" : "今日考程尚未開始";
            let statusClass = "text-gray-500";

            if (todayStr === DAY1_DATE_STR || todayStr === DAY2_DATE_STR) {
                const nowMin = now.getHours() * 60 + now.getMinutes();
                SCHEDULE_DATA.forEach(item => {
                    const [startStr, endStr] = item.time.split('–');
                    const startMin = parseInt(startStr.split(':')[0]) * 60 + parseInt(startStr.split(':')[1]);
                    const endMin = parseInt(endStr.split(':')[0]) * 60 + parseInt(endStr.split(':')[1]);
                    const dayData = (todayStr === DAY1_DATE_STR) ? item.day1 : item.day2;
                    if (nowMin >= startMin && nowMin < endMin) {
                        statusText = `正在進行：${dayData.name}`;
                        statusClass = dayData.isExam ? "text-red-600 animate-pulse" : "text-blue-700";
                    }
                });
            }
            const output = document.getElementById('current-subject-output');
            output.textContent = statusText;
            output.className = `text-2xl sm:text-4xl font-bold ${statusClass}`;
        }

        setInterval(updateClock, 1000);
        window.onload = () => {
            const now = new Date();
            const todayStr = now.toLocaleDateString('zh-TW', {year:'numeric', month:'2-digit', day:'2-digit'}).replace(/\//g, '/');
            if (todayStr === DAY2_DATE_STR) switchDay('Day2'); else switchDay('Day1');
            updateClock(); 
            updateAttendance();
        };
    </script>
</body>
</html>
